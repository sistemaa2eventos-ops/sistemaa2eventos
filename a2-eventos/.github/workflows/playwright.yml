name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 18
    - name: Install dependencies
      run: npm install -g npm@latest && cd frontend/web-admin && npm install --legacy-peer-deps
    - name: Install Playwright Browsers
      run: cd frontend/web-admin && npx playwright install --with-deps chromium
    - name: Run Playwright tests
      run: cd frontend/web-admin && npx playwright test
      env:
        URL: https://painel.nzt.app.br
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/web-admin/playwright-report/
        retention-days: 30
