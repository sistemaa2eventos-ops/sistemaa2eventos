version: '3.8'

services:
  camera-service:
    image: python:3.11-slim
    container_name: a2_eventos_camera_service
    restart: unless-stopped
    working_dir: /app
    command: >
      bash -c "pip install --no-cache-dir opencv-python numpy loguru onnxruntime redis fastapi uvicorn httpx psycopg2-binary && python -m uvicorn video_server:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      PG_EDGE_HOST: a2_eventos_pg_edge
      PG_EDGE_PORT: "5432"
      PG_EDGE_USER: a2_edge_user
      PG_EDGE_PASSWORD: a2_edge_password
      PG_EDGE_DB: a2_edge_db
      REDIS_HOST: a2_eventos_redis
      REDIS_PORT: "6379"
      A2_API_URL: http://a2_eventos_api:3001
      SUPABASE_URL: https://zznrgwytywgjsjqdjfxn.supabase.co
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      FACE_TOLERANCE: "0.55"
      MIN_FACE_SIZE: "120"
      CONFIDENCE_THRESHOLD: "0.6"
      CAMERA_1_NAME: Webcam Intelbras
      CAMERA_1_RTSP: "0"
      CAMERA_1_LOCATION: Recepcao
      CAMERA_1_TYPE: face
    volumes:
      - ./src:/app
      - camera_snapshots:/app/snapshots
    networks:
      - a2-eventos_a2_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  a2-eventos_a2_net:
    external: true

volumes:
  camera_snapshots: