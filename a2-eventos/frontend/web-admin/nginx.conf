server {
    listen 80;
    server_name localhost;

    client_max_body_size 50M;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Proxy backend API requests to Node.JS (internal Docker network)
    location /api/ {
        proxy_pass http://api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;

        # CORS handled by Node.js API
        # Nginx only handles transparent proxy
    }

    # Proxy Socket.IO
    location /socket.io/ {
        proxy_pass http://api:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Normal static file serving mapped to React Router
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # PWA Support: Do not cache Service Worker
    location /sw.js {
        add_header Cache-Control "no-cache";
        proxy_cache_bypass $http_pragma;
        proxy_cache_revalidate on;
        expires off;
        access_log off;
    }

    # PWA Support: App manifest
    location /manifest.webmanifest {
        try_files $uri /manifest.webmanifest;
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=86400";
    }

    # Vite-generated assets with hash in filename - can be cached long-term
    location ~* /assets/.*\.[a-zA-Z0-9]+\.(js|css|woff2?)$ {
        expires 6M;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media and Static Cache
    location ~* \.(?:ico|gif|jpe?g|png|eot|ttf|svg)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
