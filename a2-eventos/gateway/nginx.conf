worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Resolver interno do Docker para resolução dinâmica de nomes
    resolver 127.0.0.11 valid=30s;

    # Configurações SSL Globais (Otimizadas para Cloudflare)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 1. 🖼️ PAINEL ADMINISTRATIVO (Frontend)
    server {
        listen 80;
        server_name painel.nzt.app.br;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name painel.nzt.app.br;

        ssl_certificate /etc/nginx/certs/origin.pem;
        ssl_certificate_key /etc/nginx/certs/origin.key;

        location / {
            set $upstream_admin admin-web;
            proxy_pass http://$upstream_admin:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable cache
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Proxy API requests through admin-web nginx
        location /api/ {
            proxy_pass http://admin-web:80/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy Socket.IO for real-time events
        location /socket.io/ {
            proxy_pass http://api:3001/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_read_timeout 86400;
        }
    }

    # 2. 📝 PORTAL DE CADASTRO (Public-Web)
    server {
        listen 80;
        server_name cadastro.nzt.app.br;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name cadastro.nzt.app.br;

        ssl_certificate /etc/nginx/certs/origin.pem;
        ssl_certificate_key /etc/nginx/certs/origin.key;

        location / {
            set $upstream_cadastro cadastro-web;
            proxy_pass http://$upstream_cadastro:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 3. ⚡ API BACKEND (Com SSL)
    server {
        listen 80;
        server_name api.nzt.app.br;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.nzt.app.br;

        ssl_certificate /etc/nginx/certs/origin.pem;
        ssl_certificate_key /etc/nginx/certs/origin.key;

        location / {
            set $upstream_api api;
            proxy_pass http://$upstream_api:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # CORS headers for Private Network Access
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-evento-id, Accept' always;
            add_header 'Access-Control-Max-Age' '86400' always;

            # Resposta imediata para preflight no Gateway
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' $http_origin always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-evento-id' always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain';
                return 204;
            }
        }

        # Retorna JSON legível com CORS quando a API estiver offline
        error_page 502 503 504 @api_indisponivel;
        location @api_indisponivel {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Content-Type' 'application/json; charset=utf-8' always;
            return 503 '{"error":"Servico temporariamente indisponivel","code":"SERVICE_UNAVAILABLE","hint":"A API esta reiniciando. Tente novamente em 30 segundos."}';
        }
    }
}
