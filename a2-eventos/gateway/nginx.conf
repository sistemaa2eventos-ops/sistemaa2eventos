worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip Compression (nginx best practices)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
    gzip_min_length 256;

    # Resolver interno do Docker para resolução dinâmica de nomes
    resolver 127.0.0.11 valid=30s;

    # SSL Configuration (Cloudflare compatible - nginx + gateway-safety)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # Security headers (nginx best practices)
    server_tokens off;
    
    # Default error page
    error_page 400 401 403 404 /error.html;
    error_page 500 502 503 504 /error.html;

    # 1. 🖼️ PAINEL ADMINISTRATIVO (Frontend)
    server {
        listen 80;
        server_name painel.nzt.app.br;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name painel.nzt.app.br;

        ssl_certificate /etc/nginx/certs/origin.pem;
        ssl_certificate_key /etc/nginx/certs/origin.key;

        # Timeouts otimizados (nginx best practices)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location / {
            proxy_pass http://admin-web:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable cache
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Proxy API requests through admin-web nginx
        location /api/ {
            proxy_pass http://admin-web:80/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy Socket.IO for real-time events
        location /socket.io/ {
            proxy_pass http://api:3001/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_read_timeout 86400;
        }

        # Static files - favicon, robots.txt (nginx best practices)
        location ~* \.(favicon.ico|robots.txt|manifest.json)$ {
            proxy_pass http://admin-web:80;
            proxy_set_header Host $host;
            
            # Cache headers
            expires 30d;
            add_header Cache-Control "public, no-transform";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # Health check (nginx best practices)
        location = /health {
            access_log off;
            return 200 "nginx OK\n";
            add_header Content-Type text/plain;
        }
    }

    # 2. 📝 PORTAL DE CADASTRO (Public-Web)
    server {
        listen 80;
        server_name cadastro.nzt.app.br;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name cadastro.nzt.app.br;

        ssl_certificate /etc/nginx/certs/origin.pem;
        ssl_certificate_key /etc/nginx/certs/origin.key;

        location / {
            proxy_pass http://cadastro-web:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_pass_header Set-Cookie;
        }

        # API calls from the container should proxy through nginx
        location /api/ {
            proxy_pass http://cadastro-web:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static files caching (favicon, etc)
        location ~* \.(favicon.ico|robots.txt)$ {
            access_log off;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # 3. ⚡ API BACKEND (Com SSL)
    server {
        listen 80;
        server_name api.nzt.app.br;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.nzt.app.br;

        ssl_certificate /etc/nginx/certs/origin.pem;
        ssl_certificate_key /etc/nginx/certs/origin.key;

        location / {
            proxy_pass http://api:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # CORS handled by Node.js API
            # Nginx only handles transparent proxy
        }

        # Retorna JSON legível com CORS quando a API estiver offline
        error_page 502 503 504 @api_indisponivel;
        location @api_indisponivel {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Content-Type' 'application/json; charset=utf-8' always;
            return 503 '{"error":"Servico temporariamente indisponivel","code":"SERVICE_UNAVAILABLE","hint":"A API esta reiniciando. Tente novamente em 30 segundos."}';
        }
    }
}
