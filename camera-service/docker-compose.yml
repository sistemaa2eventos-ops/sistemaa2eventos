version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: camera-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  video-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: camera-video-server
    ports:
      - "8000:8000"
      - "8765:8765"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - /tmp/camera-snapshots:/tmp/camera-snapshots
    environment:
      - USE_GPU=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  alert-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: camera-alert-worker
    command: python -m src.alert_worker
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
      video-server:
        condition: service_started
    restart: unless-stopped

  nginx-rtsp:
    image: tiangolo/nginx-rtmp
    container_name: camera-nginx-rtmp
    ports:
      - "1935:1935"
      - "8080:8080"
    environment:
      - RTMP_STREAM_KEY=camera-stream
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  redis_data:

networks:
  default:
    name: camera-network