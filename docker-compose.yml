version: '3.8'

services:
  postgres_edge:
    image: ankane/pgvector:v0.5.1
    container_name: a2_eventos_pg_edge
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: a2_edge_user
      POSTGRES_PASSWORD: a2_edge_password
      POSTGRES_DB: a2_edge_db
    volumes:
      - pg_edge_data:/var/lib/postgresql/data
      - ./backend/api-nodejs/src/scripts/init_pg_edge.sql:/docker-entrypoint-initdb.d/init_pg_edge.sql
    networks:
      - a2_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a2_edge_user -d a2_edge_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: a2_eventos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - a2_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build:
      context: ./backend/api-nodejs
    container_name: a2_eventos_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - USE_REDIS=true
    env_file:
      - ./backend/api-nodejs/.env
    networks:
      - a2_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  gateway:
    build:
      context: ./gateway
    container_name: a2_eventos_gateway
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - a2_net

  frontend:
    build:
      context: ./frontend/web-admin
    container_name: a2_eventos_admin_web
    restart: unless-stopped
    # Porta 80 do host removida - servido via gateway
    depends_on:
      api:
        condition: service_started
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - a2_net

  ai_worker:
    build:
      context: ./backend/microservice-face-python
    container_name: a2_eventos_ai_worker
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=America/Sao_Paulo
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - USE_REDIS=true
    env_file:
      - ./backend/microservice-face-python/.env
    networks:
      - a2_net
    deploy:
      resources:
        limits:
          memory: 2G

networks:
  a2_net:
    driver: bridge

volumes:
  redis_data:
  pg_edge_data:
